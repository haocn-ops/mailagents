services:
  db:
    image: postgres:16-alpine
    container_name: mailagents-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: mailcloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mailcloud"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mailagents-api-prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      ENFORCE_SAFE_STARTUP: "true"
      REQUIRE_PROD_PREFLIGHT: "true"
      PORT: 3000
      STORAGE_BACKEND: postgres
      DATABASE_URL: postgres://postgres:postgres@db:5432/mailcloud
      MAIL_SMTP_HOST: 149.28.123.3
      MAIL_SMTP_PORT: 587
      MAIL_SMTP_SECURE: "false"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    command: >-
      sh -lc "npm run db:bootstrap && npm run db:upgrade && npm run start:prod"

  mailu-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mailagents-mailu-sync-prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    env_file:
      - .env.production
    environment:
      AGENTS_BASE_URL: http://api:3000
      MAILU_MAIL_ROOT: /mailu/mail
      MAILU_SYNC_STATE_FILE: /mailu/config/mailagents-sync-state.json
      MAILU_SYNC_INTERVAL_SEC: 15
    volumes:
      - /mailu:/mailu
    command: >-
      sh -lc "while true; do node scripts/mailu-maildir-sync.js || true; sleep ${MAILU_SYNC_INTERVAL_SEC:-15}; done"

volumes:
  pgdata_prod:
