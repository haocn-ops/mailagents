openapi: 3.1.0
info:
  title: Agent Mail Cloud V2 Preview API
  version: 0.2.0-preview
  description: |
    Incremental V2 tenant-facing API surface implemented on top of the current control plane.
    This file documents the endpoints that are live in the current main branch.
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    MailboxAccount:
      type: object
      required: [account_id, mailbox_id, address, account_status]
      properties:
        account_id:
          type: string
        mailbox_id:
          type: string
        address:
          type: string
        account_status:
          type: string
        lease_status:
          type: string
          nullable: true
        lease_id:
          type: string
          nullable: true
        lease_expires_at:
          type: string
          format: date-time
          nullable: true
        provider_ref:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    MailboxLease:
      type: object
      required: [lease_id, mailbox_id, account_id, address, agent_id, purpose, lease_status]
      properties:
        lease_id:
          type: string
        mailbox_id:
          type: string
        account_id:
          type: string
        address:
          type: string
        agent_id:
          type: string
        purpose:
          type: string
        lease_status:
          type: string
        started_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
        released_at:
          type: string
          format: date-time
          nullable: true
    Message:
      type: object
      required: [message_id, sender, sender_domain, subject, received_at, parsed_status]
      properties:
        message_id:
          type: string
        mailbox_id:
          type: string
          nullable: true
        sender:
          type: string
        sender_domain:
          type: string
        subject:
          type: string
        raw_ref:
          type: string
          nullable: true
        received_at:
          type: string
          format: date-time
        otp_code:
          type: string
          nullable: true
        verification_link:
          type: string
          nullable: true
        parsed_status:
          type: string
    SendAttempt:
      type: object
      required: [send_attempt_id, mailbox_id, to, subject, submission_status, created_at, updated_at]
      properties:
        send_attempt_id:
          type: string
        mailbox_id:
          type: string
        to:
          type: array
          items:
            type: string
        subject:
          type: string
        submission_status:
          type: string
        accepted:
          type: array
          items:
            type: string
        rejected:
          type: array
          items:
            type: string
        message_id:
          type: string
          nullable: true
        response:
          type: string
          nullable: true
        envelope:
          nullable: true
        error:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Webhook:
      type: object
      required: [webhook_id, event_types, target_url, status]
      properties:
        webhook_id:
          type: string
        event_types:
          type: array
          items:
            type: string
        target_url:
          type: string
          format: uri
        status:
          type: string
        last_delivery_at:
          type: string
          format: date-time
          nullable: true
        last_status_code:
          type: integer
          nullable: true
    WebhookDelivery:
      type: object
      required: [webhook_id, delivery_id]
      properties:
        webhook_id:
          type: string
        delivery_id:
          type: string
        status_code:
          type: integer
          nullable: true
        attempts:
          type: integer
          nullable: true
        ok:
          type: boolean
          nullable: true
        error_message:
          type: string
          nullable: true
        response_excerpt:
          type: string
          nullable: true
        request_id:
          type: string
          nullable: true
        delivered_at:
          type: string
          format: date-time
          nullable: true
    WebhookSecretRotationResult:
      type: object
      required: [webhook_id, secret]
      properties:
        webhook_id:
          type: string
        secret:
          type: string
    UsageSummary:
      type: object
      required: [period, usage]
      properties:
        period:
          type: string
          pattern: '^\d{4}-\d{2}$'
        usage:
          type: object
          required: [api_calls, active_mailboxes, message_parses, billable_units]
          properties:
            api_calls:
              type: integer
            active_mailboxes:
              type: integer
            message_parses:
              type: integer
            billable_units:
              type: integer
    Invoice:
      type: object
      required: [invoice_id, tenant_id, period_start, period_end, amount_usdc, status]
      properties:
        invoice_id:
          type: string
        tenant_id:
          type: string
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        amount_usdc:
          type: number
        status:
          type: string
        statement_hash:
          type: string
          nullable: true
        settlement_tx_hash:
          type: string
          nullable: true
security:
  - bearerAuth: []
paths:
  /v2/mailboxes/accounts:
    get:
      summary: List mailbox accounts visible to the current tenant
      responses:
        '200':
          description: Mailbox account list
  /v2/mailboxes/leases:
    get:
      summary: List active mailbox leases for the current tenant
      responses:
        '200':
          description: Mailbox lease list
    post:
      summary: Allocate a mailbox lease for the current tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, purpose, ttl_hours]
              properties:
                agent_id:
                  type: string
                purpose:
                  type: string
                ttl_hours:
                  type: integer
      responses:
        '201':
          description: Mailbox lease created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailboxLease'
  /v2/mailboxes/leases/{lease_id}:
    get:
      summary: Get mailbox lease detail for the current tenant
      parameters:
        - in: path
          name: lease_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Mailbox lease detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailboxLease'
  /v2/mailboxes/leases/{lease_id}/release:
    post:
      summary: Release a mailbox lease
      parameters:
        - in: path
          name: lease_id
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Mailbox lease released
  /v2/mailboxes/accounts/{account_id}/credentials/reset:
    post:
      summary: Reset mailbox credentials for a mailbox account
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Mailbox credentials issued
  /v2/webhooks:
    get:
      summary: List webhooks for the current tenant
      responses:
        '200':
          description: Webhook list
    post:
      summary: Create webhook for the current tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_types, target_url, secret]
              properties:
                event_types:
                  type: array
                  items:
                    type: string
                target_url:
                  type: string
                  format: uri
                secret:
                  type: string
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
  /v2/webhooks/{webhook_id}:
    get:
      summary: Get webhook detail for the current tenant
      parameters:
        - in: path
          name: webhook_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
  /v2/webhooks/{webhook_id}/rotate-secret:
    post:
      summary: Rotate webhook secret for the current tenant webhook
      parameters:
        - in: path
          name: webhook_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook secret rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSecretRotationResult'
  /v2/webhooks/deliveries:
    get:
      summary: List webhook deliveries for the current tenant
      parameters:
        - in: query
          name: webhook_id
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Webhook delivery history
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookDelivery'
  /v2/usage/summary:
    get:
      summary: Get tenant usage summary for a billing period
      parameters:
        - in: query
          name: period
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      responses:
        '200':
          description: Usage summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSummary'
  /v2/messages:
    get:
      summary: List messages for a mailbox visible to the current tenant
      parameters:
        - in: query
          name: mailbox_id
          required: true
          schema:
            type: string
        - in: query
          name: since
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Message list
  /v2/messages/{message_id}:
    get:
      summary: Get message detail for the current tenant
      parameters:
        - in: path
          name: message_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Message detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
  /v2/messages/send:
    post:
      summary: Submit an outbound message and return a send attempt handle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mailbox_id, mailbox_password, to, subject]
              properties:
                mailbox_id:
                  type: string
                mailbox_password:
                  type: string
                to:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                subject:
                  type: string
                text:
                  type: string
                html:
                  type: string
      responses:
        '202':
          description: Send accepted and tracked as a send attempt
  /v2/send-attempts:
    get:
      summary: List outbound send attempts for the current tenant
      responses:
        '200':
          description: Send attempt list
  /v2/send-attempts/{send_attempt_id}:
    get:
      summary: Get outbound send attempt detail
      parameters:
        - in: path
          name: send_attempt_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Send attempt detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendAttempt'
  /v2/billing/invoices:
    get:
      summary: List invoices for the current tenant
      parameters:
        - in: query
          name: period
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      responses:
        '200':
          description: Invoice list
  /v2/billing/invoices/{invoice_id}:
    get:
      summary: Get invoice detail for the current tenant
      parameters:
        - in: path
          name: invoice_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
