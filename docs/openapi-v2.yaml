openapi: 3.1.0
info:
  title: Agent Mail Cloud V2 Preview API
  version: 0.2.0-preview
  description: |
    Incremental V2 tenant-facing API surface implemented on top of the current control plane.
    This file documents the endpoints that are live in the current main branch.
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Webhook:
      type: object
      required: [webhook_id, event_types, target_url, status]
      properties:
        webhook_id:
          type: string
        event_types:
          type: array
          items:
            type: string
        target_url:
          type: string
          format: uri
        status:
          type: string
    UsageSummary:
      type: object
      required: [period, usage]
      properties:
        period:
          type: string
          pattern: '^\d{4}-\d{2}$'
        usage:
          type: object
          required: [api_calls, active_mailboxes, message_parses, billable_units]
          properties:
            api_calls:
              type: integer
            active_mailboxes:
              type: integer
            message_parses:
              type: integer
            billable_units:
              type: integer
    Invoice:
      type: object
      required: [invoice_id, tenant_id, period_start, period_end, amount_usdc, status]
      properties:
        invoice_id:
          type: string
        tenant_id:
          type: string
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        amount_usdc:
          type: number
        status:
          type: string
        statement_hash:
          type: string
          nullable: true
        settlement_tx_hash:
          type: string
          nullable: true
security:
  - bearerAuth: []
paths:
  /v2/webhooks:
    get:
      summary: List webhooks for the current tenant
      responses:
        '200':
          description: Webhook list
    post:
      summary: Create webhook for the current tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_types, target_url, secret]
              properties:
                event_types:
                  type: array
                  items:
                    type: string
                target_url:
                  type: string
                  format: uri
                secret:
                  type: string
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
  /v2/usage/summary:
    get:
      summary: Get tenant usage summary for a billing period
      parameters:
        - in: query
          name: period
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      responses:
        '200':
          description: Usage summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSummary'
  /v2/billing/invoices:
    get:
      summary: List invoices for the current tenant
      parameters:
        - in: query
          name: period
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      responses:
        '200':
          description: Invoice list
  /v2/billing/invoices/{invoice_id}:
    get:
      summary: Get invoice detail for the current tenant
      parameters:
        - in: path
          name: invoice_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
